name: Security Gate

on:
  push:

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for forbidden file
        run: |
          echo "Checking for forbidden files..."
          [ -f passwords.txt ] && echo "Forbidden file detected!" && exit 1 || echo "No forbidden files found."
